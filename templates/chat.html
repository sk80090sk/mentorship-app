<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI Mentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ FIXED CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- MENU ICON (LEFT TOP) -->
    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <!-- LOGOUT ICON (RIGHT TOP) -->
    <div class="logout-btn" onclick="go('/logout')">➜]</div>



    <!-- SIDE MENU -->
    <div class="side-menu" id="sideMenu">
        <div class="close-btn" onclick="toggleMenu()">✖</div>

        <!-- ✅ FIXED LINKS -->
        <div onclick="go('/dashboard')">🏠 Dashboard</div>
        <div onclick="go('/mentorship')">🎓 Mentorship</div>
        <div onclick="go('/task')">📋 Task</div>
        <div onclick="go('/timer')">⏱️ Timer</div>
        <div onclick="go('/current')">📰 Current</div>
        <div onclick="go('/ai')">🤖 AI</div>
        <div onclick="go('/about')">ℹ️ About</div>
        <div onclick="go('/logout')">🚪 Logout</div>

    </div>

    <div class="card">
        <h2>UPSC Mentor Chat</h2>

        <!-- Chat Container -->
        <div id="chatContainer" style="height:400px; overflow-y:auto; border:1px solid #6bc0c393; padding:10px;">
            <p><b>AI Mentor:</b> Hello! Ask me anything about Your preparation.</p>
        </div>

        <br>

        <!-- Input Area -->
        <input class="w-100" type="text" id="userInput" placeholder="Type your question..." />
        <br>
        <button onclick="sendMessage()">Send</button>


    </div>
    </div>

    <!-- Motivation -->
    <div class="motivation">
        <p class="quote">
            “Use AI wisely — it can multiply your effort.”
        </p>
        <p class="sub">
            Tools don’t make you successful — how you use them does 🚀
        </p>
    </div>

    <!-- ✅ FIXED JS -->
    <script src="{{ url_for('static', filename='ai.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
